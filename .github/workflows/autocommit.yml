name: Auto commit

on:

  push:
    branches:
      - main
      - master
      
  schedule:
    - cron: "1 * * * *" # Every hour. See https://crontab.guru/#1_*_*_*_*
  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    env:
      AUTO_COMMIT_EMAIL: ${{ vars.AUTO_COMMIT_EMAIL }}
      AUTO_COMMIT_NAME: ${{ vars.AUTO_COMMIT_NAME }}
    steps:
      - name: DEBUG 
        run: echo "::debug::Ref = ${{github.ref}}"
      - uses: actions/checkout@v3      
        with:
         persist-credentials: false
         fetch-depth: 0

      - name: Modify last update
        run: |
          d=`date '+%Y-%m-%dT%H:%M:%SZ'`
          echo $d > LAST_UPDATED
          
      - name: Commit changes
        run: |
          git config --local user.email "${AUTO_COMMIT_EMAIL:-your-github-email@example.com}"
          git config --local user.name "${AUTO_COMMIT_NAME:-your-github-username}"
          git add -A
          
          arr[0]="chore(bot): 😂 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 👿 auto commit"
          arr[3]="chore(bot): 💩 auto commit"
          arr[4]="chore(bot): 🙏 auto commit"
          arr[5]="chore(bot): 🙈 auto commit"
          arr[6]="chore(bot): 🐐 auto commit"
          arr[7]="chore(bot): 🤖 auto commit"
          arr[8]="chore(bot): 🟩 auto commit"
          arr[9]="chore(bot): 👻 auto commit"
          
          rand=$[$RANDOM % ${#arr[@]}]
          
          git commit -m "${arr[$rand]}"
          
      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          directory: "."
          github_token: ${{ secrets.GITHUB_TOKEN }}
